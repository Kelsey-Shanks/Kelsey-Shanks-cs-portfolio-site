<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Page PDF Viewer</title>
    <!-- Include PDF.js from a public CDN -->
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin: 20px;
        }
        .controls {
            margin-bottom: 15px;
        }
        button {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            margin: 0 5px;
        }
        #page-info {
            font-size: 16px;
            margin: 0 10px;
        }
        #canvas-container {
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background: white;
            padding: 10px;
        }
        canvas {
            display: block;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="prev-btn">Previous</button>
        <span id="page-info">Page <span id="page-num">1</span> of <span id="page-count">0</span></span>
        <button id="next-btn">Next</button>
    </div>

    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        // Update this path to match your folder and PDF filename
        const url = './documents/health-app-figma-presentation.pdf'; 

        // Point PDF.js to the worker script
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumPending = null;

        const scale = 1.5,
              canvas = document.getElementById('pdf-canvas'),
              ctx = canvas.getContext('2d');

        // Render the target page
        function renderPage(num) {
            pageIsRendering = true;

            // Fetch the specific page
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(() => {
                    pageIsRendering = false;

                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });

                // Update DOM elements
                document.getElementById('page-num').textContent = num;
            });
        }

        // Check for pending pages to queue up rendering
        function queueRenderPage(num) {
            if (pageIsRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        // Show Previous Page
        document.getElementById('prev-btn').addEventListener('click', () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        });

        // Show Next Page
        document.getElementById('next-btn').addEventListener('click', () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });

        // Get Document
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => {
            console.error('Error loading PDF: ', err);
            alert('Could not load PDF. Check file path or console logs.');
        });
    </script>

</body>
</html>
