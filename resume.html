<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My CS Portfolio Site - Resume</title>
        <link rel="stylesheet" href="site.css">
    </head>
    <body background="images/cherry-blossoms (1).webp">
        <header class="navbar">
            <div class="logo">Kelsey Shanks</div>
            <nav class="nav-container">
                <!-- Hamburger Icon for Mobile -->
                <button class="nav-toggle" id="nav-toggle-id" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <!-- Navigation Links -->
                <ul class="nav-links" id="nav-links-id">
                    <li><a href=index.html>Home</a></li>
                    <li><a href=about-me.html>About</a></li>
                    <li><a href=resume.html>Resume</a></li>
                    <li><a href=portfolio.html>Portoflio</a></li>
                    <li><a href=contact-me.html>Contact</a></li>
                </ul>
                <!-- Event Listener for Menu -->
                <script>
                    const toggle_button = document.getElementById('nav-toggle-id');
                    const nav_links = document.getElementById('nav-links-id');

                    toggle_button.addEventListener('click', () => {
                        toggle_button.classList.toggle('active');
                        nav_links.classList.toggle('active');
                        const isExpanded = toggle_button.classList.contains('active');
                        toggle_button.setAttribute('aria-expanded', isExpanded);
                    });
                </script>
            </nav>
        </header>
        <main>
            <section id="resume-page-content">
                <h2 id="resume-title">My Resume</h2>
                <iframe src="./documents/kelsey-shanks-resume.pdf" id="resume-view"></iframe>
            </section>
            <footer>
                <p>&copy; 2025 Kelsey Shanks. All rights reserved.</p>
            </footer>
        </main>
    </body>
</html>
